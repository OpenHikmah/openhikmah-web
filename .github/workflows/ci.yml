name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Least privilege: this workflow only reads the repo (checkout) and runs
# tests/build — it never writes back to GitHub. Override per-job if needed.
permissions:
  contents: read

jobs:
  lint-typecheck-test:
    name: Lint · Type-check · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Type-check
        run: bun run typecheck

      - name: Test
        run: bun run test:ci

  integration:
    name: Integration (Testcontainers)
    runs-on: ubuntu-latest
    # GitHub-hosted ubuntu runners have a running Docker daemon, so
    # Testcontainers spins up Postgres without extra setup.
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Integration tests
        run: bun run test:integration

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck-test, integration]
    # Placeholder env vars so Next.js build succeeds without real secrets.
    # Actual secrets are set in Vercel project settings for deployments.
    env:
      ANTHROPIC_API_KEY: sk-ant-placeholder
      AI_PROVIDER: claude
      GEMINI_API_KEY: placeholder-gemini-key
      GEMINI_MODEL: gemini-2.0-flash
      NEXT_PUBLIC_QF_CLIENT_ID: placeholder-client-id
      QF_API_BASE: https://placeholder.example.com
      QF_AUTH_BASE: https://placeholder.example.com
      QF_CLIENT_SECRET: placeholder-secret
      NEXT_PUBLIC_APP_URL: https://openhikmah.com
      NEXT_PUBLIC_QF_AUTH_BASE: https://placeholder.example.com
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [lint-typecheck-test]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      DEV_AUTH_TOKEN: e2e-dev-token
      DEV_AUTH_QF_ID: e2e-dev-qf-id
      ANTHROPIC_API_KEY: sk-ant-placeholder
      AI_PROVIDER: claude
      GEMINI_API_KEY: placeholder-gemini-key
      GEMINI_MODEL: gemini-2.0-flash
      NEXT_PUBLIC_QF_CLIENT_ID: placeholder-client-id
      QF_API_BASE: https://placeholder.example.com
      QF_AUTH_BASE: https://placeholder.example.com
      QF_CLIENT_SECRET: placeholder-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3100
      NEXT_PUBLIC_QF_AUTH_BASE: https://placeholder.example.com
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run migrations
        run: bun run db:migrate

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: E2E tests
        run: bun run test:e2e
