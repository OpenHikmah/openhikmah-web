name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default. Jobs that need to report back to PRs override this explicitly.
permissions:
  contents: read

jobs:
  lint-typecheck-test:
    name: Lint · Type-check · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Type-check
        run: bun run typecheck

      - name: Test
        run: bun run test:ci

  integration:
    name: Integration (Testcontainers)
    runs-on: ubuntu-latest
    # GitHub-hosted ubuntu runners have a running Docker daemon, so
    # Testcontainers spins up Postgres without extra setup.
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Integration tests
        run: bun run test:integration

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck-test, integration]
    # Placeholder env vars so Next.js build succeeds without real secrets.
    # Actual secrets are set in Vercel project settings for deployments.
    env:
      ANTHROPIC_API_KEY: sk-ant-placeholder
      AI_PROVIDER: claude
      GEMINI_API_KEY: placeholder-gemini-key
      GEMINI_MODEL: gemini-2.0-flash
      NEXT_PUBLIC_QF_CLIENT_ID: placeholder-client-id
      QF_API_BASE: https://placeholder.example.com
      QF_AUTH_BASE: https://placeholder.example.com
      QF_CLIENT_SECRET: placeholder-secret
      NEXT_PUBLIC_APP_URL: https://openhikmah.com
      NEXT_PUBLIC_QF_AUTH_BASE: https://placeholder.example.com
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Measure bundle size
        run: |
          bunx size-limit --json > "$RUNNER_TEMP/size-current.json" || true
          cp .size-limit.cjs "$RUNNER_TEMP/.size-limit.cjs"

      - name: Check out base branch for bundle comparison
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Install base dependencies
        if: github.event_name == 'pull_request'
        continue-on-error: true
        working-directory: base
        run: bun install --frozen-lockfile

      - name: Build base branch
        if: github.event_name == 'pull_request'
        continue-on-error: true
        working-directory: base
        run: bun run build

      - name: Measure base bundle size
        if: github.event_name == 'pull_request'
        continue-on-error: true
        working-directory: base
        run: |
          cp "$RUNNER_TEMP/.size-limit.cjs" .size-limit.cjs
          ../node_modules/.bin/size-limit --json > "$RUNNER_TEMP/size-base.json" || true

      # Fork PRs get a read-only GITHUB_TOKEN on `pull_request` events no matter what
      # `permissions:` declares here, so this job can never post the PR comment itself.
      # It only publishes the reports; bundle-size-comment.yml (triggered by `workflow_run`,
      # which runs with the base repo's write token) does the actual commenting.
      - name: Upload bundle size reports
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-size-reports
          path: |
            ${{ runner.temp }}/size-current.json
            ${{ runner.temp }}/size-base.json
          retention-days: 1

      - name: Save PR number
        if: github.event_name == 'pull_request'
        run: echo "${{ github.event.pull_request.number }}" > "$RUNNER_TEMP/pr-number.txt"

      - name: Upload PR number
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pr-number
          path: ${{ runner.temp }}/pr-number.txt
          retention-days: 1

      - name: Check bundle size
        run: bun run size

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [lint-typecheck-test]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      DEV_AUTH_TOKEN: e2e-dev-token
      DEV_AUTH_QF_ID: e2e-dev-qf-id
      ADMIN_QF_IDS: e2e-dev-qf-id
      ANTHROPIC_API_KEY: sk-ant-placeholder
      AI_PROVIDER: claude
      GEMINI_API_KEY: placeholder-gemini-key
      GEMINI_MODEL: gemini-2.0-flash
      NEXT_PUBLIC_QF_CLIENT_ID: placeholder-client-id
      QF_API_BASE: https://placeholder.example.com
      QF_AUTH_BASE: https://placeholder.example.com
      QF_CLIENT_SECRET: placeholder-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3100
      NEXT_PUBLIC_QF_AUTH_BASE: https://placeholder.example.com
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run migrations
        run: bun run db:migrate

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: E2E tests
        run: bun run test:e2e
