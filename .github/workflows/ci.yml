name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Least privilege by default. Jobs that need to report back to PRs override this explicitly.
permissions:
  contents: read

jobs:
  lint-typecheck-test:
    name: Lint · Type-check · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Type-check
        run: bun run typecheck

      - name: Test
        run: bun run test:ci

  integration:
    name: Integration (Testcontainers)
    runs-on: ubuntu-latest
    # GitHub-hosted ubuntu runners have a running Docker daemon, so
    # Testcontainers spins up Postgres without extra setup.
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Integration tests
        run: bun run test:integration

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck-test, integration]
    permissions:
      contents: read
      issues: write
      pull-requests: write
    # Placeholder env vars so Next.js build succeeds without real secrets.
    # Actual secrets are set in Vercel project settings for deployments.
    env:
      ANTHROPIC_API_KEY: sk-ant-placeholder
      AI_PROVIDER: claude
      GEMINI_API_KEY: placeholder-gemini-key
      GEMINI_MODEL: gemini-2.0-flash
      NEXT_PUBLIC_QF_CLIENT_ID: placeholder-client-id
      QF_API_BASE: https://placeholder.example.com
      QF_AUTH_BASE: https://placeholder.example.com
      QF_CLIENT_SECRET: placeholder-secret
      NEXT_PUBLIC_APP_URL: https://openhikmah.com
      NEXT_PUBLIC_QF_AUTH_BASE: https://placeholder.example.com
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Measure bundle size
        run: |
          bunx size-limit --json > "$RUNNER_TEMP/size-current.json" || true
          cp .size-limit.cjs "$RUNNER_TEMP/.size-limit.cjs"

      - name: Check out base branch for bundle comparison
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Install base dependencies
        if: github.event_name == 'pull_request'
        continue-on-error: true
        working-directory: base
        run: bun install --frozen-lockfile

      - name: Build base branch
        if: github.event_name == 'pull_request'
        continue-on-error: true
        working-directory: base
        run: bun run build

      - name: Measure base bundle size
        if: github.event_name == 'pull_request'
        continue-on-error: true
        working-directory: base
        run: |
          cp "$RUNNER_TEMP/.size-limit.cjs" .size-limit.cjs
          ../node_modules/.bin/size-limit --json > "$RUNNER_TEMP/size-base.json" || true

      - name: Comment bundle size delta
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('node:fs')

            const loadReport = (fileName) => {
              try {
                const content = fs.readFileSync(`${process.env.RUNNER_TEMP}/${fileName}`, 'utf8').trim()
                if (!content) return null

                const report = JSON.parse(content)
                return Array.isArray(report) && report.length > 0 ? report[0] : null
              } catch {
                return null
              }
            }

            const currentReport = loadReport('size-current.json')
            const baseReport = loadReport('size-base.json')
            const current = currentReport ?? baseReport
            const base = baseReport ?? currentReport

            if (!current || !base) {
              throw new Error('No bundle size report was available to comment on')
            }

            const delta = current.size - base.size
            const percent = base.size === 0 ? 0 : (delta / base.size) * 100
            const marker = '<!-- openhikmah-size-limit-report -->'

            const formatBytes = (bytes) => `${(bytes / 1000).toFixed(2)} kB`
            const formatDelta = (bytes) => `${bytes >= 0 ? '+' : '-'}${formatBytes(Math.abs(bytes))}`
            const formatPercent = (value) => `${value >= 0 ? '+' : ''}${value.toFixed(2)}%`

            const body = [
              marker,
              '### Bundle Size Report',
              '',
              '| Budget | Base | PR | Delta | Status |',
              '| --- | ---: | ---: | ---: | --- |',
              `| ${formatBytes(current.sizeLimit)} | ${formatBytes(base.size)} | ${formatBytes(current.size)} | ${formatDelta(delta)} (${formatPercent(percent)}) | ${current.passed ? 'Passed' : 'Failed'} |`,
              '',
              'Scope: total shipped client JS matching `.next/static/**/*.js`, including route-level and dynamically imported chunks. This is intentionally not an initial-load-only budget.',
            ].join('\n')

            const { owner, repo } = context.repo
            const issue_number = context.payload.pull_request.number
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 })
            const existing = comments.find((comment) => comment.user.type === 'Bot' && comment.body.includes(marker))

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body })
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body })
            }

      - name: Check bundle size
        run: bun run size
