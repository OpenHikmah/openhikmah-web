name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Least privilege: this workflow only reads the repo (checkout) and runs
# tests/build — it never writes back to GitHub. Override per-job if needed.
permissions:
  contents: read

jobs:
  lint-typecheck-test:
    name: Lint · Type-check · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type-check
        run: bun run typecheck

      - name: Test
        run: bun run test:ci

  integration:
    name: Integration (Testcontainers)
    runs-on: ubuntu-latest
    # GitHub-hosted ubuntu runners have a running Docker daemon, so
    # Testcontainers spins up Postgres without extra setup.
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Integration tests
        run: bun run test:integration

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck-test, integration]
    # Placeholder env vars so Next.js build succeeds without real secrets.
    # Actual secrets are set in Vercel project settings for deployments.
    env:
      ANTHROPIC_API_KEY: sk-ant-placeholder
      AI_PROVIDER: claude
      GEMINI_API_KEY: placeholder-gemini-key
      GEMINI_MODEL: gemini-2.0-flash
      NEXT_PUBLIC_QF_CLIENT_ID: placeholder-client-id
      QF_API_BASE: https://placeholder.example.com
      QF_AUTH_BASE: https://placeholder.example.com
      QF_CLIENT_SECRET: placeholder-secret
      NEXT_PUBLIC_APP_URL: https://openhikmah.com
      NEXT_PUBLIC_QF_AUTH_BASE: https://placeholder.example.com
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
